<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A81-Axis · MASTER · TECH/EVO + WaU + UaW</title>

<script src="A81-Axis.js"></script>
<script src="M-Axis.js"></script>
<script src="T-Axis.js"></script>
<script src="A81-TECH-EVO.js"></script>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
pre { background:#111; padding:20px; border-left:3px solid #0f0; }
h1 { color:#0f0; text-align:center; }
</style>
</head>

<body>

<h1>A81-Axis · MASTER · Combined</h1>
<pre id="out">Lade…</pre>

<script>
// 1) Achsen laden
const axis = A81_AXIS.compute();
const m     = M_AXIS.compute();
const t     = T_AXIS.compute();
const evo   = A81_TECH_EVO.build();

// 2) Inhalte aus WaU.html und UaW.html laden
async function loadModule(file){
    const response = await fetch(file);
    return await response.text();
}

Promise.all([
    loadModule("index.html"),   // Option 1
    loadModule("WaU.html"),     // Option 2
    loadModule("UaW.html")      // Option 3
]).then(modules => {

    const combined = {
        A81_AXIS: axis,
        M_AXIS: m,
        T_AXIS: t,
        A81_TECH_EVO: evo,
        MODULE_index: modules[0],
        MODULE_WaU: modules[1],
        MODULE_UaW: modules[2]
    };

    document.getElementById("out").innerText =
        JSON.stringify(combined, null, 2);
});
</script>

</body>
</html>
